<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Van G. Adams | Gamer Profile</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-red: #ff0055;
            --dark-bg: #0a0a12;
            --card-bg: #161625;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Orbitron', sans-serif; /* Modern Gamer Font */
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* The Gamer Card */
        .gamer-card {
            width: 320px;
            background: var(--card-bg);
            border: 2px solid var(--neon-blue);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 20px var(--neon-blue);
            margin-bottom: 30px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--neon-red);
            object-fit: cover;
        }

        .stat-bar {
            background: #333;
            height: 10px;
            border-radius: 5px;
            margin: 10px 0;
            overflow: hidden;
        }

        .stat-fill {
            background: var(--neon-blue);
            height: 100%;
            width: 85%; /* Van's Power Level */
        }

        /* Buttons */
        .btn {
            display: block;
            width: 80%;
            margin: 10px auto;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* Game Area */
        #game-container {
            width: 320px;
            height: 200px;
            background: #000;
            border: 2px dashed var(--neon-red);
            position: relative;
            overflow: hidden;
            margin-top: 20px;
            cursor: crosshair;
        }

        #game-target {
            position: absolute;
            width: 40px;
            height: 40px;
            transition: 0.2s;
        }
    </style>
</head>
<body>

    <div class="gamer-card">
        <img src="110.jpg" class="profile-img">
        <h2>VAN GLEN ADAMS</h2>
        <p style="color: var(--neon-red);">RANK: ELITE ARCHITECT</p>
        
        <div class="stat-bar"><div class="stat-fill"></div></div>
        <p style="font-size: 10px;">XP: 2018 / 9999</p>

        <a href="#" class="btn">ROBLOX: [User]</a>
        <a href="#" class="btn">STEAM: [User]</a>
    </div>

    <h3>MINI-GAME: CATCH THE GLITCH</h3>
    <p>Score: <span id="score">0</span></p>
    <div id="game-container">
        <img src="110.jpg" id="game-target" style="border-radius: 50%;">
    </div>

    <script>
        const target = document.getElementById('game-target');
        const container = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        let score = 0;

        function moveTarget() {
            const x = Math.random() * (container.clientWidth - 40);
            const y = Math.random() * (container.clientHeight - 40);
            target.style.left = x + 'px';
            target.style.top = y + 'px';
        }

        target.addEventListener('click', () => {
            score++;
            scoreEl.innerText = score;
            moveTarget();
        });

        // Start moving
        setInterval(moveTarget, 1000);
    </script>

</body>
</html>
